<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Red Otavalo Comunitario</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rojo:     #e63946;
      --texto:    #ffffff;
      --acento:   #f4a261;
      --amarillo: #f4d03f;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: #000;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #mapa {
      flex: 1;
      width: 100%;
    }

    /* PANEL SIN FONDO */
    #panel {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px;
    }

    #info {
      width: 100%;
      text-align: center;
      font-size: .8rem;
      color: #fff;
      text-shadow: 0 0 6px rgba(0,0,0,.8);
    }

    #info strong { color: var(--acento); }

    button {
      border-radius: 8px;
      cursor: pointer;
    }

    #btn-enviar {
      background: #25D366;
      color: #fff;
      border: none;
      padding: 10px 18px;
      font-family: 'Bebas Neue';
      font-size: 1rem;
      letter-spacing: 2px;
    }

    #btn-enviar:disabled {
      background: #444;
      opacity: .6;
    }

    #btn-limpiar {
      background: rgba(0,0,0,0.5);
      border: 1.5px solid var(--rojo);
      color: var(--rojo);
      padding: 9px 14px;
      font-size: .82rem;
    }

    #btn-recorrido {
      background: rgba(0,0,0,0.5);
      border: 1.5px solid var(--amarillo);
      color: var(--amarillo);
      padding: 9px 14px;
      font-size: .82rem;
    }

    #btn-recorrido.activo {
      background: rgba(244,208,63,.2);
      color: #fff176;
      animation: parpadeo .8s infinite;
    }

    @keyframes parpadeo {
      0%,100% { opacity: 1; }
      50% { opacity: .5; }
    }

    .leaflet-control-container .leaflet-bar {
      box-shadow: none !important;
    }

    .leaflet-interactive {
      stroke: var(--rojo) !important;
      fill: rgba(230,57,70,.18) !important;
    }
  </style>
</head>

<body>

<div id="mapa"></div>

<div id="panel">
  <div id="info">Dibuja un círculo o activa el recorrido para marcar la zona del incidente.</div>
  <button id="btn-recorrido" onclick="sonar('recorrido'); toggleRecorrido()">🥷 Sospechoso</button>
  <button id="btn-limpiar" onclick="sonar('limpiar'); limpiarTodo()">🗑️ Borrar</button>
  <button id="btn-enviar" disabled onclick="sonar('enviar'); enviarWhatsApp()">WhatsApp</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// AUDIO (igual)
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function sonar(tipo){
 if(ctx.state==='suspended') ctx.resume();
 const t=ctx.currentTime;
 const o=ctx.createOscillator(),g=ctx.createGain();
 o.connect(g); g.connect(ctx.destination);
 o.type='sine'; o.frequency.value=600;
 g.gain.setValueAtTime(.2,t);
 g.gain.exponentialRampToValueAtTime(.001,t+.2);
 o.start(t); o.stop(t+.2);
}

// FIREBASE
const firebaseConfig = {
  apiKey:"AIzaSyA_KtZk_UtY1ub33hs1Ub_bUw7PBBOGViM",
  authDomain:"seguridadcomunitaria-6e360.firebaseapp.com",
  databaseURL:"https://seguridadcomunitaria-6e360-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const refMapa = db.ref('alertas/activa');

// MAPA
const mapa = L.map('mapa').setView([0.2331,-78.2615],17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

const capasDibujadas = new L.FeatureGroup().addTo(mapa);

mapa.addControl(new L.Control.Draw({
  draw:{circle:true,polygon:false,polyline:false,rectangle:false,marker:false},
  edit:{featureGroup:capasDibujadas}
}));

let circuloActual=null;
let recorridoActual=null;
let puntosRecorrido=[];
let modoRecorrido=false;

// EVENTOS
mapa.on(L.Draw.Event.CREATED,e=>{
 circuloActual=e.layer;
 capasDibujadas.addLayer(circuloActual);
 actualizarInfo();
});

function toggleRecorrido(){
 modoRecorrido=!modoRecorrido;
 document.getElementById('btn-recorrido').classList.toggle('activo');
}

function actualizarInfo(){
 if(!circuloActual){
   document.getElementById('info').textContent="Sin datos";
   return;
 }
 const c=circuloActual.getLatLng();
 document.getElementById('info').innerHTML=`<strong>Zona:</strong> ${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`;
 document.getElementById('btn-enviar').disabled=false;
}

function limpiarTodo(){
 capasDibujadas.clearLayers();
 circuloActual=null;
 document.getElementById('info').textContent="Dibuja un círculo";
 document.getElementById('btn-enviar').disabled=true;
}

function enviarWhatsApp(){
 if(!circuloActual) return;
 const c=circuloActual.getLatLng();
 const msg=`Alerta: https://maps.google.com/?q=${c.lat},${c.lng}`;
 window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
