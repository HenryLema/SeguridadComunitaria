<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reporte de Alboroto</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo:     #e63946;
      --oscuro:   #1a1a2e;
      --panel:    #16213e;
      --borde:    #0f3460;
      --texto:    #eaeaea;
      --acento:   #f4a261;
      --amarillo: #f4d03f;
      --verde:    #25D366;
    }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--oscuro);
      color: var(--texto);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: transparent;
      border-bottom: none;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pulse-icon {
      width: 30px; height: 30px;
      background: var(--rojo);
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
      animation: pulso 1.6s ease-in-out infinite;
    }
    .pulse-icon::after {
      content: '!';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; color: #fff;
    }
    @keyframes pulso {
      0%,100% { opacity: 1; }
      50%      { opacity: .6; }
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      letter-spacing: 3px;
      color: #fff;
      line-height: 1;
    }
    header h1 span { color: var(--rojo); }
    .instruccion {
      position: absolute;
      top: 50px; left: 0; right: 0;
      z-index: 999;
      background: transparent;
      text-align: center;
      font-size: .76rem;
      padding: 4px 12px;
      color: var(--acento);
      letter-spacing: .5px;
    }
    #estado-sync {
      position: absolute;
      top: 108px; left: 50%; transform: translateX(-50%);
      z-index: 999;
      background: transparent;
      border-radius: 20px;
      font-size: .70rem;
      padding: 2px 10px;
      color: #888;
      transition: color .3s;
      white-space: nowrap;
    }
    #estado-sync.conectado { color: #4caf50; }
    #estado-sync.error     { color: var(--rojo); }
    #mapa {
      flex: 1;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    #panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      background: transparent;
      border-top: none;
      padding: 6px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #info {
      font-size: .76rem;
      color: #fff;
      line-height: 1.4;
    }
    #info strong { color: var(--acento); font-size: .80rem; }
    #info b      { color: #fff; }
    #botones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    #btn-enviar, #btn-limpiar, #btn-recorrido, #btn-actualizar {
      background: rgba(255,255,255,0.25);
      border-radius: 8px;
      padding: 10px 8px;
      font-family: 'Barlow', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-width: 1.5px;
      border-style: solid;
      width: 100%;
    }
    #btn-enviar    { border-color: var(--verde);    color: var(--verde); }
    #btn-enviar:hover  { background: rgba(37,211,102,.15); }
    #btn-enviar:active { background: rgba(37,211,102,.25); }
    #btn-enviar:disabled { border-color: #555; color: #555; cursor: not-allowed; opacity: .6; }
    #btn-limpiar   { border-color: var(--rojo);     color: var(--rojo); }
    #btn-limpiar:hover { background: rgba(230,57,70,.15); }
    #btn-recorrido { border-color: var(--amarillo); color: var(--amarillo); }
    #btn-recorrido:hover { background: rgba(244,208,63,.15); }
    #btn-recorrido.activo {
      background: rgba(244,208,63,.2);
      border-color: #fff176;
      color: #fff176;
      animation: parpadeo .8s ease-in-out infinite;
    }
    #btn-actualizar { border-color: #4fc3f7; color: #4fc3f7; }
    #btn-actualizar:hover { background: rgba(79,195,247,.15); }
    @keyframes parpadeo {
      0%,100% { opacity: 1; }
      50%      { opacity: .5; }
    }

    /* ── Marcadores inicio / fin de recorrido ── */
    .dot-inicio {
      width: 18px; height: 18px;
      background: #ff2200;
      border: 3px solid #fff;
      border-radius: 50%;
    }
    .dot-fin {
      width: 18px; height: 18px;
      background: #8b0000;
      border: 3px solid #fff;
      border-radius: 50%;
      animation: palpitar 0.8s ease-in-out infinite;
    }
    @keyframes palpitar {
      0%,100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.6); opacity: .4; }
    }

    .leaflet-control-container .leaflet-bar,
    .leaflet-control-container .leaflet-bar a,
    .leaflet-touch .leaflet-bar { box-shadow: none !important; }
    .leaflet-top.leaflet-left { top: 130px !important; }
    .leaflet-interactive { stroke: var(--rojo) !important; fill: rgba(230,57,70,.18) !important; }
  </style>
</head>
<body>

<header>
  <div class="pulse-icon"></div>
  <div><h1>Alerta <span>Roja</span></h1></div>
</header>

<div class="instruccion">
  🔴 Usa el botón círculo en el mapa &nbsp;→&nbsp;✏️ Dibuja la zona del incidente &nbsp;→&nbsp;👮‍♂️ Envía por WhatsApp 🚔
</div>

<div id="estado-sync">⏳ Conectando...</div>
<div id="mapa"></div>

<div id="panel">
  <div id="info">Dibuja un círculo o activa el recorrido para marcar la zona del incidente.</div>
  <div id="botones">
    <button id="btn-recorrido" onclick="toggleRecorrido()">🥷 Sospechoso</button>
    <button id="btn-limpiar"   onclick="sonar('limpiar'); limpiarTodo()">🗑️ Borrar</button>
    <button id="btn-actualizar" onclick="sonar('actualizar'); location.reload()">🔄 Actualizar</button>
    <button id="btn-enviar" disabled onclick="sonar('enviar'); enviarWhatsApp()">
      <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 2.824.737 5.476 2.027 7.782L0 32l8.418-2.006A15.94 15.94 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm8.29 22.617c-.348.977-2.04 1.865-2.813 1.98-.719.107-1.623.152-2.617-.165-.602-.195-1.375-.455-2.363-.893-4.151-1.793-6.862-5.96-7.072-6.237-.206-.277-1.677-2.232-1.677-4.255 0-2.024 1.063-3.02 1.44-3.43.378-.41.823-.513 1.098-.513.274 0 .548.003.788.014.253.012.592-.097.927.707.348.83 1.183 2.855 1.287 3.063.104.208.174.452.035.73-.14.277-.21.45-.417.693-.208.243-.437.542-.623.727-.208.208-.424.433-.182.85.243.416 1.079 1.78 2.317 2.883 1.59 1.418 2.933 1.857 3.35 2.065.416.208.658.174.9-.104.243-.277 1.044-1.218 1.322-1.634.277-.416.554-.347.935-.208.38.138 2.413 1.138 2.828 1.345.416.208.693.312.796.487.104.174.104 1.009-.244 1.986z"/>
      </svg>
      WhatsApp
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ══════════════════════════════════════════════
// AUDIO — sonido DIFERENTE por cada acción
// ══════════════════════════════════════════════
const actx = new (window.AudioContext || window.webkitAudioContext)();

function sonar(tipo) {
  if (actx.state === 'suspended') actx.resume();
  const t = actx.currentTime;

  const osc = (type, freq, start, dur, gainStart, gainEnd, freqEnd) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, start + dur);
    g.gain.setValueAtTime(gainStart, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur + 0.01);
  };

  switch(tipo) {

    case 'circulo':
      // Ping doble ascendente — zona marcada
      osc('sine',     880, t,        0.12, 0.22, 0.001, 1320);
      osc('sine',    1320, t + 0.14, 0.10, 0.15, 0.001);
      break;

    case 'recorrido_inicio':
      // Tres notas ascendentes rápidas — ¡arranca el rastreo!
      [330, 495, 660].forEach((f, i) =>
        osc('triangle', f, t + i * 0.08, 0.10, 0.22, 0.001));
      break;

    case 'recorrido_fin':
      // Tres notas descendentes — rastreo terminado
      [660, 495, 330].forEach((f, i) =>
        osc('triangle', f, t + i * 0.09, 0.12, 0.22, 0.001));
      break;

    case 'limpiar':
      // Glide descendente tipo "borrar"
      osc('sawtooth', 700, t, 0.28, 0.15, 0.001, 100);
      break;

    case 'enviar':
      // Acorde mayor alegre — mensaje enviado
      [523, 659, 784, 1046].forEach((f, i) =>
        osc('sine', f, t + i * 0.06, 0.30, 0.18, 0.001));
      break;

    case 'actualizar':
      // Clic + subida — recargar
      osc('square', 300, t,        0.05, 0.20, 0.001, 600);
      osc('sine',   800, t + 0.07, 0.08, 0.15, 0.001);
      break;

    case 'mapa':
      // Tac seco — botones del mapa Leaflet
      osc('square', 220, t, 0.06, 0.18, 0.001, 60);
      break;

    case 'alerta':
      // Sirena urgente — dispositivos receptores
      [440, 554, 659, 880, 1100].forEach((f, i) =>
        osc('sine', f, t + i * 0.11, 0.18, 0.30, 0.001));
      break;
  }
}

// Sonido en botones del mapa (Leaflet toolbar)
document.addEventListener('click', e => {
  if (e.target.closest('.leaflet-draw-toolbar') ||
      e.target.closest('.leaflet-draw-actions') ||
      e.target.closest('.leaflet-control-zoom')) sonar('mapa');
});

// ══════════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyA_KtZk_UtY1ub33hs1Ub_bUw7PBBOGViM",
  authDomain:        "seguridadcomunitaria-6e360.firebaseapp.com",
  projectId:         "seguridadcomunitaria-6e360",
  storageBucket:     "seguridadcomunitaria-6e360.firebasestorage.app",
  messagingSenderId: "788418223348",
  appId:             "1:788418223348:web:899bc4e0deafdcfc7152a1",
  databaseURL:       "https://seguridadcomunitaria-6e360-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db       = firebase.database();
const refMapa  = db.ref('alertas/activa');
const estadoEl = document.getElementById('estado-sync');

// ══════════════════════════════════════════════
// CONFIGURACIÓN
// ══════════════════════════════════════════════
const WHATSAPP_NUMS = ['593963761330', '59399591992'];
const ZOOM_INICIAL  = 17;
const LAT_DEFAULT   = 0.23311819176648024;
const LNG_DEFAULT   = -78.26155393719128;
const MI_ID = 'usr_' + Math.random().toString(36).substr(2, 9);

// ══════════════════════════════════════════════
// ICONOS MARCADORES
// ══════════════════════════════════════════════
const iconoInicio = L.divIcon({
  className: '',
  html: '<div class="dot-inicio"></div>',
  iconSize: [18, 18], iconAnchor: [9, 9]
});
const iconoFin = L.divIcon({
  className: '',
  html: '<div class="dot-fin"></div>',
  iconSize: [18, 18], iconAnchor: [9, 9]
});

// ══════════════════════════════════════════════
// MAPA
// ══════════════════════════════════════════════
const mapa = L.map('mapa', { attributionControl: false })
              .setView([LAT_DEFAULT, LNG_DEFAULT], ZOOM_INICIAL);
L.control.attribution({ prefix: false, position: 'bottomright' }).addTo(mapa);
mapa.attributionControl.setPrefix('RedOtavalo');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '', maxZoom: 19
}).addTo(mapa);

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos =>
    mapa.setView([pos.coords.latitude, pos.coords.longitude], ZOOM_INICIAL));
}

// ══════════════════════════════════════════════
// CAPAS
// ══════════════════════════════════════════════
const capasDibujadas = new L.FeatureGroup().addTo(mapa);

const controlDibujo = new L.Control.Draw({
  position: 'topleft',
  draw: {
    circle:       { shapeOptions: { color: '#e63946', fillOpacity: 0.18 } },
    polygon: false, polyline: false, rectangle: false,
    marker:  false, circlemarker: false
  },
  edit: { featureGroup: capasDibujadas }
});
mapa.addControl(controlDibujo);

// ══════════════════════════════════════════════
// ESTADO LOCAL
// ══════════════════════════════════════════════
let circuloActual   = null;
let recorridoActual = null;
let marcadorInicio  = null;
let marcadorFin     = null;
let modoRecorrido   = false;
let puntosRecorrido = [];
let cargaInicial    = true;

// ══════════════════════════════════════════════
// HELPERS MARCADORES
// ══════════════════════════════════════════════
function ponerInicio(latlng) {
  if (marcadorInicio) capasDibujadas.removeLayer(marcadorInicio);
  marcadorInicio = L.marker(latlng, { icon: iconoInicio, zIndexOffset: 900 });
  capasDibujadas.addLayer(marcadorInicio);
}
function ponerFin(latlng) {
  if (marcadorFin) capasDibujadas.removeLayer(marcadorFin);
  marcadorFin = L.marker(latlng, { icon: iconoFin, zIndexOffset: 1000 });
  capasDibujadas.addLayer(marcadorFin);
}
function quitarMarcadores() {
  if (marcadorInicio) { capasDibujadas.removeLayer(marcadorInicio); marcadorInicio = null; }
  if (marcadorFin)    { capasDibujadas.removeLayer(marcadorFin);    marcadorFin    = null; }
}

// ══════════════════════════════════════════════
// RENDER (desde Firebase)
// ══════════════════════════════════════════════
function renderCirculo(datos) {
  if (circuloActual) capasDibujadas.removeLayer(circuloActual);
  circuloActual = L.circle([datos.lat, datos.lng], {
    radius: datos.radio, color: '#e63946', fillOpacity: 0.18
  });
  capasDibujadas.addLayer(circuloActual);
}

function renderRecorrido(puntos) {
  if (recorridoActual) capasDibujadas.removeLayer(recorridoActual);
  quitarMarcadores();
  puntosRecorrido = puntos.map(p => L.latLng(p.lat, p.lng));
  recorridoActual = L.polyline(puntosRecorrido, {
    color: '#f4d03f', weight: 4, opacity: .85, dashArray: '8, 6'
  });
  capasDibujadas.addLayer(recorridoActual);
  if (puntosRecorrido.length > 0) {
    ponerInicio(puntosRecorrido[0]);
    ponerFin(puntosRecorrido[puntosRecorrido.length - 1]);
  }
}

// ══════════════════════════════════════════════
// AUTO-POSICIONAMIENTO RECEPTORES
// ══════════════════════════════════════════════
function volarAlIncidente(datos, autor) {
  if (autor === MI_ID) return;
  if (datos.circulo)
    mapa.flyTo([datos.circulo.lat, datos.circulo.lng], 18, { animate: true, duration: 1.2 });
  else if (datos.recorrido && datos.recorrido.length > 0)
    mapa.flyTo([datos.recorrido[0].lat, datos.recorrido[0].lng], 18, { animate: true, duration: 1.2 });
  sonar('alerta');
  estadoEl.textContent = '🚨 ¡NUEVO INCIDENTE!';
  estadoEl.className   = 'error';
  setTimeout(() => {
    estadoEl.textContent = '🟢 Sincronizado en Tiempo Real';
    estadoEl.className   = 'conectado';
  }, 3000);
}

// ══════════════════════════════════════════════
// FIREBASE: ESCUCHAR
// ══════════════════════════════════════════════
refMapa.on('value', snapshot => {
  const datos = snapshot.val();
  estadoEl.className   = 'conectado';
  estadoEl.textContent = '🟢 Sincronizado en Tiempo Real';

  if (!datos) {
    capasDibujadas.clearLayers();
    circuloActual = null; recorridoActual = null;
    marcadorInicio = null; marcadorFin = null; puntosRecorrido = [];
    cargaInicial = false; resetInfo(); return;
  }

  if (datos.circulo)                                 renderCirculo(datos.circulo);
  if (datos.recorrido && datos.recorrido.length > 1) renderRecorrido(datos.recorrido);
  if (!cargaInicial) volarAlIncidente(datos, datos.autor || '');
  cargaInicial = false;
  actualizarInfo();

}, error => {
  estadoEl.className   = 'error';
  estadoEl.textContent = '🔴 Sin conexión';
});

// ══════════════════════════════════════════════
// FIREBASE: PUBLICAR
// ══════════════════════════════════════════════
function publicarEstado() {
  const payload = { autor: MI_ID };
  if (circuloActual) {
    const c = circuloActual.getLatLng();
    payload.circulo = { lat: c.lat, lng: c.lng, radio: circuloActual.getRadius() };
  }
  if (recorridoActual && puntosRecorrido.length > 1)
    payload.recorrido = puntosRecorrido.map(p => ({ lat: p.lat, lng: p.lng }));
  if (Object.keys(payload).length > 1) refMapa.set(payload);
}

// ══════════════════════════════════════════════
// EVENTOS CÍRCULO
// ══════════════════════════════════════════════
mapa.on(L.Draw.Event.CREATED, e => {
  sonar('circulo');
  if (circuloActual) capasDibujadas.removeLayer(circuloActual);
  circuloActual = e.layer;
  capasDibujadas.addLayer(circuloActual);
  publicarEstado(); actualizarInfo();
});
mapa.on(L.Draw.Event.EDITED,  () => { publicarEstado(); actualizarInfo(); });
mapa.on(L.Draw.Event.DELETED, () => { circuloActual = null; publicarEstado(); actualizarInfo(); });

// ══════════════════════════════════════════════
// RECORRIDO SOSPECHOSO
// ══════════════════════════════════════════════
function toggleRecorrido() {
  modoRecorrido = !modoRecorrido;
  const btn = document.getElementById('btn-recorrido');

  if (modoRecorrido) {
    sonar('recorrido_inicio');                        // sonido INICIO
    btn.classList.add('activo');
    btn.textContent = '⏹ Detener';
    mapa.dragging.disable();
    document.getElementById('mapa').style.cursor = 'crosshair';
    document.getElementById('info').innerHTML =
      '<strong>🔴 Rastreo activo</strong><br>Arrastra el dedo / mouse para trazar el camino.';
  } else {
    sonar('recorrido_fin');                           // sonido FIN
    btn.classList.remove('activo');
    btn.textContent = '🥷 Sospechoso';
    mapa.dragging.enable();
    document.getElementById('mapa').style.cursor = '';
    // Colocar marcador final en último punto
    if (puntosRecorrido.length > 0)
      ponerFin(puntosRecorrido[puntosRecorrido.length - 1]);
    if (puntosRecorrido.length > 1) publicarEstado();
    actualizarInfo();
  }
}

mapa.on('mousemove', e => { if (modoRecorrido) agregarPunto(e.latlng); });
mapa.on('mouseup',   ()  => { if (modoRecorrido) toggleRecorrido(); });

const mapaEl = document.getElementById('mapa');
mapaEl.addEventListener('touchmove', e => {
  if (!modoRecorrido) return;
  e.preventDefault();
  const touch = e.touches[0];
  const rect  = mapaEl.getBoundingClientRect();
  agregarPunto(mapa.containerPointToLatLng(
    L.point(touch.clientX - rect.left, touch.clientY - rect.top)));
}, { passive: false });
mapaEl.addEventListener('touchend', () => { if (modoRecorrido) toggleRecorrido(); });

function agregarPunto(latlng) {
  if (puntosRecorrido.length > 0) {
    const ult = puntosRecorrido[puntosRecorrido.length - 1];
    if (mapa.distance(ult, latlng) < 3) return;
  }
  // Primer punto → marcador de INICIO rojo
  if (puntosRecorrido.length === 0) ponerInicio(latlng);

  puntosRecorrido.push(latlng);
  if (recorridoActual) capasDibujadas.removeLayer(recorridoActual);
  recorridoActual = L.polyline(puntosRecorrido, {
    color: '#f4d03f', weight: 4, opacity: .85, dashArray: '8, 6'
  });
  capasDibujadas.addLayer(recorridoActual);
  document.getElementById('btn-enviar').disabled = false;
}

// ══════════════════════════════════════════════
// INFO PANEL
// ══════════════════════════════════════════════
function actualizarInfo() {
  const tieneC = circuloActual !== null;
  const tieneR = recorridoActual !== null && puntosRecorrido.length > 1;
  if (!tieneC && !tieneR) { resetInfo(); return; }
  let html = '';
  if (tieneC) {
    const c = circuloActual.getLatLng(), r = Math.round(circuloActual.getRadius());
    html += `<strong>📍 Zona Marcada</strong><br>Centro: <b>${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}</b><br>Radio aprox.: <b>${r} metros</b><br>`;
  }
  if (tieneR) {
    const ini = puntosRecorrido[0], fin = puntosRecorrido[puntosRecorrido.length - 1];
    html += `<strong>🥷 Recorrido Sospechoso</strong><br>
             🔴 Inicio: <b>${ini.lat.toFixed(6)}, ${ini.lng.toFixed(6)}</b><br>
             🔴 Fin: <b>${fin.lat.toFixed(6)}, ${fin.lng.toFixed(6)}</b><br>
             Puntos: <b>${puntosRecorrido.length}</b>`;
  }
  document.getElementById('info').innerHTML = html;
  document.getElementById('btn-enviar').disabled = false;
}

function resetInfo() {
  document.getElementById('info').textContent = 'Dibuja un círculo o activa el recorrido para marcar la zona del incidente.';
  document.getElementById('btn-enviar').disabled = true;
}

// ══════════════════════════════════════════════
// LIMPIAR
// ══════════════════════════════════════════════
function limpiarTodo() {
  capasDibujadas.clearLayers();
  circuloActual = null; recorridoActual = null;
  marcadorInicio = null; marcadorFin = null; puntosRecorrido = [];
  if (modoRecorrido) toggleRecorrido();
  refMapa.remove();
  resetInfo();
}

// ══════════════════════════════════════════════
// WHATSAPP
// ══════════════════════════════════════════════
function enviarWhatsApp() {
  const tieneC = circuloActual !== null;
  const tieneR = recorridoActual !== null && puntosRecorrido.length > 1;
  if (!tieneC && !tieneR) return;
  let msg = `🚨 *Alerta Roja*\n\n`;
  if (tieneC) {
    const c = circuloActual.getLatLng();
    const lat = c.lat.toFixed(6), lng = c.lng.toFixed(6);
    const r = Math.round(circuloActual.getRadius());
    msg += `📍 *Zona del Incidente:*\nLatitud: ${lat}\nLongitud: ${lng}\nRadio Aprox.: ${r} metros\n🗺️ https://maps.google.com/?q=${lat},${lng}\n\n`;
  }
  if (tieneR) {
    const ini = puntosRecorrido[0], fin = puntosRecorrido[puntosRecorrido.length - 1];
    msg += `🥷 *Recorrido Sospechoso:*\n🔴 Inicio: ${ini.lat.toFixed(6)}, ${ini.lng.toFixed(6)}\n🗺️ https://maps.google.com/?q=${ini.lat.toFixed(6)},${ini.lng.toFixed(6)}\n🔴 Fin: ${fin.lat.toFixed(6)}, ${fin.lng.toFixed(6)}\n🗺️ https://maps.google.com/?q=${fin.lat.toFixed(6)},${fin.lng.toFixed(6)}\nPuntos: ${puntosRecorrido.length}\n\n`;
  }
  msg += `⏰ ${new Date().toLocaleString('es-EC', {timeZone:'America/Guayaquil'})}`;
  WHATSAPP_NUMS.forEach(num => window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank'));
}
</script>
